<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceWave - تواصل صوتي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #0a0c10;
    --bg-base: #0f1117;
    --bg-card: #161b25;
    --bg-hover: #1e2535;
    --bg-input: #0d1018;
    --accent: #4f8ef7;
    --accent-glow: rgba(79,142,247,0.25);
    --accent-2: #7c5cfc;
    --green: #3ecf8e;
    --red: #f75f5f;
    --yellow: #f7c948;
    --text-1: #e8ecf4;
    --text-2: #8b93a7;
    --text-3: #4a5168;
    --border: rgba(255,255,255,0.07);
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg-deep);
    color: var(--text-1);
    overflow: hidden;
  }

  /* ─── LOBBY ─── */
  #lobby {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(79,142,247,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(124,92,252,0.08) 0%, transparent 70%),
      var(--bg-deep);
  }

  .lobby-card {
    width: 420px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
    justify-content: center;
  }

  .logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 8px 24px var(--accent-glow);
  }

  .logo-text {
    font-size: 26px; font-weight: 700;
    background: linear-gradient(135deg, var(--text-1), var(--text-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .lobby-title {
    font-size: 15px; color: var(--text-2); text-align: center;
    margin-bottom: 32px; font-weight: 400; line-height: 1.6;
  }

  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-2); margin-bottom: 8px; letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .field input {
    width: 100%; padding: 13px 16px;
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-1);
    font-family: inherit; font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none; direction: ltr;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .field input::placeholder { color: var(--text-3); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0; color: var(--text-3); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .btn {
    width: 100%; padding: 14px;
    border: none; border-radius: var(--radius-sm);
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px var(--accent-glow); }
  .btn-primary:active { transform: translateY(0); }

  .btn-outline {
    background: transparent; color: var(--text-1);
    border: 1px solid var(--border); margin-top: 10px;
  }
  .btn-outline:hover { background: var(--bg-hover); border-color: rgba(255,255,255,0.15); }

  /* ─── APP LAYOUT ─── */
  #app {
    display: none;
    height: 100vh;
    flex-direction: row;
  }

  /* Sidebar */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--bg-base);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 20px 16px;
    gap: 8px;
  }

  .sidebar-header {
    padding: 4px 4px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .room-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; color: var(--text-1);
  }

  .room-badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .section-label {
    font-size: 10px; font-weight: 700; color: var(--text-3);
    letter-spacing: 1px; text-transform: uppercase;
    padding: 0 4px 6px;
  }

  .user-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: var(--radius-sm);
    transition: background 0.15s;
  }
  .user-item:hover { background: var(--bg-hover); }

  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
    position: relative;
  }

  .avatar.speaking::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 50%;
    border: 2px solid var(--green);
    box-shadow: 0 0 10px var(--green);
    animation: speak 0.5s ease-in-out infinite alternate;
  }

  @keyframes speak {
    from { opacity: 0.5; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1.05); }
  }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 500; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-status { font-size: 11px; color: var(--text-3); margin-top: 1px; }

  .mute-icon { font-size: 14px; color: var(--text-3); }
  .mute-icon.muted { color: var(--red); }

  /* Controls */
  .controls {
    margin-top: auto;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .my-info {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }

  .my-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white;
  }

  .my-name { font-size: 13px; font-weight: 600; color: var(--text-1); }
  .my-room { font-size: 11px; color: var(--text-3); }

  .ctrl-btns { display: flex; gap: 8px; }

  .ctrl-btn {
    flex: 1; padding: 9px;
    background: var(--bg-hover); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-2);
    font-size: 16px; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:hover { background: var(--bg-input); color: var(--text-1); }
  .ctrl-btn.active { background: rgba(247,95,95,0.15); border-color: rgba(247,95,95,0.3); color: var(--red); }
  .ctrl-btn.leave { background: rgba(247,95,95,0.12); border-color: rgba(247,95,95,0.25); color: var(--red); }
  .ctrl-btn.leave:hover { background: rgba(247,95,95,0.25); }

  /* Main area */
  .main {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg-deep);
    overflow: hidden;
  }

  .topbar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: rgba(15,17,23,0.8);
    backdrop-filter: blur(10px);
  }

  .topbar-icon { font-size: 18px; color: var(--accent); }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .topbar-sub { font-size: 12px; color: var(--text-3); margin-right: 4px; }

  /* Voice visualization area */
  .voice-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 32px; overflow: hidden; position: relative;
  }

  .voice-grid {
    display: flex; flex-wrap: wrap; gap: 20px;
    align-items: center; justify-content: center;
    max-width: 700px;
  }

  .voice-card {
    width: 140px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    transition: all 0.3s;
  }

  .voice-card.speaking {
    border-color: rgba(62,207,142,0.4);
    box-shadow: 0 0 24px rgba(62,207,142,0.15);
    background: var(--bg-hover);
  }

  .voice-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: white;
    position: relative;
  }

  .voice-avatar.speaking::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 2.5px solid var(--green);
    animation: speak 0.6s ease-in-out infinite alternate;
    box-shadow: 0 0 14px rgba(62,207,142,0.5);
  }

  .voice-card-name {
    font-size: 12px; font-weight: 600; color: var(--text-1);
    text-align: center; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; width: 100%;
  }

  .voice-card-status {
    font-size: 11px; color: var(--text-3);
  }

  .wave-bars {
    display: flex; align-items: center; gap: 2px; height: 16px;
  }

  .wave-bar {
    width: 3px; border-radius: 2px;
    background: var(--green); opacity: 0.5;
    transition: height 0.1s;
  }

  .voice-card.speaking .wave-bar { opacity: 1; }

  /* Chat */
  .chat-panel {
    width: 300px; min-width: 300px;
    background: var(--bg-base);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }

  .chat-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--text-2);
    display: flex; align-items: center; gap: 8px;
  }

  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    scrollbar-width: thin; scrollbar-color: var(--bg-hover) transparent;
  }

  .msg {
    display: flex; flex-direction: column; gap: 3px;
  }

  .msg-header {
    display: flex; align-items: baseline; gap: 8px;
  }

  .msg-name { font-size: 12px; font-weight: 600; color: var(--accent); }
  .msg-time { font-size: 10px; color: var(--text-3); }
  .msg-text { font-size: 13px; color: var(--text-1); line-height: 1.5; }

  .msg.mine .msg-name { color: var(--accent-2); }

  .chat-input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
  }

  .chat-input {
    flex: 1; padding: 10px 14px;
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text-1);
    font-family: inherit; font-size: 13px; outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }

  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--text-3); }

  .send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border: none; color: white; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 12px var(--accent-glow); }

  /* Empty state */
  .empty-room {
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; color: var(--text-3); text-align: center;
  }
  .empty-room .big-icon { font-size: 48px; opacity: 0.3; }
  .empty-room p { font-size: 13px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 20px; padding: 10px 20px;
    font-size: 13px; color: var(--text-1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .lobby-card { animation: fadeIn 0.5s ease; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ═══════════════ LOBBY ═══════════════ -->
<div id="lobby">
  <div class="lobby-card">
    <div class="logo">
      <div class="logo-icon">🎙️</div>
      <div class="logo-text">VoiceWave</div>
    </div>
    <p class="lobby-title">تواصل صوتي فوري مع أي شخص في العالم</p>

    <div class="field">
      <label>اسمك</label>
      <input type="text" id="input-name" placeholder="أدخل اسمك" maxlength="20">
    </div>

    <div class="field">
      <label>كود الغرفة</label>
      <input type="text" id="input-room" placeholder="مثال: gaming-123" maxlength="30">
    </div>

    <div class="divider">أو</div>

    <button class="btn btn-primary" onclick="joinRoom()">🎙️ انضم للغرفة</button>
    <button class="btn btn-outline" onclick="createRoom()">✨ إنشاء غرفة جديدة</button>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">

  <!-- Sidebar: Users -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="room-badge">
        <div class="dot"></div>
        <span id="room-name-display">الغرفة</span>
      </div>
    </div>

    <div class="section-label">الأعضاء</div>
    <div id="users-list"></div>

    <div class="controls">
      <div class="my-info">
        <div class="my-avatar" id="my-avatar-ctrl">أ</div>
        <div>
          <div class="my-name" id="my-name-ctrl">اسمك</div>
          <div class="my-room" id="my-room-ctrl">الغرفة</div>
        </div>
      </div>
      <div class="ctrl-btns">
        <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()" title="كتم الصوت">🎙️</button>
        <button class="ctrl-btn leave" onclick="leaveRoom()" title="مغادرة">📴</button>
      </div>
    </div>
  </div>

  <!-- Main voice area -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-icon">🔊</span>
      <span class="topbar-title">قناة الصوت</span>
      <span class="topbar-sub" id="member-count">0 عضو</span>
    </div>
    <div class="voice-area">
      <div class="voice-grid" id="voice-grid">
        <div class="empty-room">
          <div class="big-icon">🎙️</div>
          <p>انتظار الأعضاء...</p>
          <p>شارك كود الغرفة مع أصدقائك</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="chat-header">
      💬 الشات
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input-area">
      <input class="chat-input" id="chat-input" placeholder="اكتب رسالة..." onkeypress="handleChatKey(event)">
      <button class="send-btn" onclick="sendChat()">➤</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<!-- Hidden audio elements -->
<div id="audio-container" style="display:none"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let socket;
let localStream;
let myName = '';
let myRoom = '';
let muted = false;
let peers = {}; // { socketId: RTCPeerConnection }
let roomUsers = {}; // { socketId: { name, muted } }
let mySocketId = '';

// TURN/STUN config - using public STUN + free Metered TURN
const ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    // مجاني من Open Relay - يساعد على اختراق NAT
    {
      urls: 'turn:openrelay.metered.ca:80',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turn:openrelay.metered.ca:443',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turns:openrelay.metered.ca:443',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    }
  ]
};

// ═══════════════════════════════════════
// LOBBY
// ═══════════════════════════════════════
function createRoom() {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let id = '';
  for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('input-room').value = id;
  showToast('✨ كود الغرفة: ' + id + ' — شاركه مع أصدقائك!');
}

async function joinRoom() {
  const name = document.getElementById('input-name').value.trim();
  const room = document.getElementById('input-room').value.trim();

  if (!name) { showToast('⚠️ أدخل اسمك'); return; }
  if (!room) { showToast('⚠️ أدخل كود الغرفة'); return; }

  myName = name;
  myRoom = room;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    showToast('❌ تعذر الوصول للميكروفون - تأكد من الإذن');
    return;
  }

  initSocket();
}

// ═══════════════════════════════════════
// SOCKET
// ═══════════════════════════════════════
function initSocket() {
  socket = io();
  mySocketId = '';

  socket.on('connect', () => {
    mySocketId = socket.id;
    socket.emit('join-room', { roomId: myRoom, userName: myName });
    showApp();
  });

  socket.on('room-state', ({ users }) => {
    roomUsers = users;
    renderUsers();
    // Connect to existing users
    Object.keys(users).forEach(sid => {
      if (sid !== mySocketId) {
        createPeerConnection(sid, true);
      }
    });
  });

  socket.on('user-joined', ({ socketId, userName, users }) => {
    roomUsers = users;
    renderUsers();
    showToast('👋 ' + userName + ' انضم للغرفة');
  });

  socket.on('user-left', ({ socketId }) => {
    const name = roomUsers[socketId]?.name;
    delete roomUsers[socketId];
    removePeer(socketId);
    renderUsers();
    if (name) showToast('👋 ' + name + ' غادر الغرفة');
  });

  socket.on('user-muted', ({ socketId, muted: m }) => {
    if (roomUsers[socketId]) roomUsers[socketId].muted = m;
    renderUsers();
  });

  // WebRTC signaling
  socket.on('offer', async ({ from, offer }) => {
    const pc = createPeerConnection(from, false);
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answer', { to: from, answer });
  });

  socket.on('answer', async ({ from, answer }) => {
    const pc = peers[from];
    if (pc) await pc.setRemoteDescription(answer);
  });

  socket.on('ice-candidate', ({ from, candidate }) => {
    const pc = peers[from];
    if (pc && candidate) pc.addIceCandidate(candidate).catch(() => {});
  });

  socket.on('chat-message', ({ from, userName, message, time }) => {
    addChatMessage({ from, userName, message, time });
  });
}

// ═══════════════════════════════════════
// WebRTC
// ═══════════════════════════════════════
function createPeerConnection(socketId, isInitiator) {
  if (peers[socketId]) return peers[socketId];

  const pc = new RTCPeerConnection(ICE_CONFIG);
  peers[socketId] = pc;

  // Add local audio
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  // ICE
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('ice-candidate', { to: socketId, candidate: e.candidate });
    }
  };

  // Remote audio
  pc.ontrack = (e) => {
    const audio = document.getElementById('audio-' + socketId) || createAudioEl(socketId);
    audio.srcObject = e.streams[0];

    // Voice activity detection
    detectVoiceActivity(socketId, e.streams[0]);
  };

  pc.onconnectionstatechange = () => {
    if (['disconnected','failed','closed'].includes(pc.connectionState)) {
      removePeer(socketId);
    }
  };

  // Create offer if initiator
  if (isInitiator) {
    pc.onnegotiationneeded = async () => {
      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('offer', { to: socketId, offer: pc.localDescription });
      } catch (e) {}
    };
  }

  return pc;
}

function createAudioEl(socketId) {
  const audio = document.createElement('audio');
  audio.id = 'audio-' + socketId;
  audio.autoplay = true;
  document.getElementById('audio-container').appendChild(audio);
  return audio;
}

function removePeer(socketId) {
  if (peers[socketId]) {
    peers[socketId].close();
    delete peers[socketId];
  }
  const audio = document.getElementById('audio-' + socketId);
  if (audio) audio.remove();
  const card = document.getElementById('card-' + socketId);
  if (card) card.remove();
}

// ═══════════════════════════════════════
// VOICE ACTIVITY DETECTION
// ═══════════════════════════════════════
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function detectVoiceActivity(socketId, stream) {
  try {
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    setInterval(() => {
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b) / data.length;
      const speaking = avg > 10;
      const card = document.getElementById('card-' + socketId);
      const avatar = document.getElementById('avatar-' + socketId);
      if (card) card.classList.toggle('speaking', speaking);
      if (avatar) avatar.classList.toggle('speaking', speaking);
    }, 100);
  } catch(e) {}
}

// ═══════════════════════════════════════
// UI
// ═══════════════════════════════════════
function showApp() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('room-name-display').textContent = '#' + myRoom;
  document.getElementById('my-name-ctrl').textContent = myName;
  document.getElementById('my-room-ctrl').textContent = myRoom;
  document.getElementById('my-avatar-ctrl').textContent = myName[0].toUpperCase();

  addVoiceCard(mySocketId || 'me', myName, true);
}

function renderUsers() {
  const list = document.getElementById('users-list');
  list.innerHTML = '';

  Object.entries(roomUsers).forEach(([sid, user]) => {
    const isMe = sid === mySocketId;
    const el = document.createElement('div');
    el.className = 'user-item';
    el.innerHTML = `
      <div class="avatar" id="avatar-${sid}">${user.name[0].toUpperCase()}</div>
      <div class="user-info">
        <div class="user-name">${user.name}${isMe ? ' (أنت)' : ''}</div>
        <div class="user-status">${user.muted ? '🔇 مكتوم' : '🎙️ متصل'}</div>
      </div>
      <span class="mute-icon ${user.muted ? 'muted' : ''}">${user.muted ? '🔇' : ''}</span>
    `;
    list.appendChild(el);

    // Add voice card if not exist
    if (!document.getElementById('card-' + sid)) {
      addVoiceCard(sid, user.name, isMe);
    }
  });

  // Update member count
  const count = Object.keys(roomUsers).length;
  document.getElementById('member-count').textContent = count + ' عضو';

  // Clear empty state if users
  if (count > 0) {
    const empty = document.querySelector('.empty-room');
    if (empty) empty.remove();
  }
}

function addVoiceCard(sid, name, isMe) {
  const grid = document.getElementById('voice-grid');
  const empty = grid.querySelector('.empty-room');
  if (empty) empty.remove();

  if (document.getElementById('card-' + sid)) return;

  const card = document.createElement('div');
  card.className = 'voice-card' + (isMe ? '' : '');
  card.id = 'card-' + sid;
  card.innerHTML = `
    <div class="voice-avatar" id="voice-avatar-${sid}">${name[0].toUpperCase()}</div>
    <div class="wave-bars">
      ${[1,2,3,4,5].map(i => `<div class="wave-bar" style="height:${4 + Math.random()*8}px; animation: wave${i} 0.5s ease-in-out infinite alternate; animation-delay:${i*0.1}s"></div>`).join('')}
    </div>
    <div class="voice-card-name">${name}${isMe ? ' 👑' : ''}</div>
    <div class="voice-card-status">${isMe ? 'أنت' : '🎙️ متصل'}</div>
  `;
  grid.appendChild(card);
}

// ═══════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════
function toggleMute() {
  muted = !muted;
  if (localStream) {
    localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  }
  const btn = document.getElementById('mute-btn');
  btn.textContent = muted ? '🔇' : '🎙️';
  btn.classList.toggle('active', muted);
  socket.emit('toggle-mute', { muted });
  showToast(muted ? '🔇 تم كتم الصوت' : '🎙️ تم تفعيل الصوت');
}

function leaveRoom() {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  Object.keys(peers).forEach(sid => removePeer(sid));
  if (socket) socket.disconnect();
  location.reload();
}

// ═══════════════════════════════════════
// CHAT
// ═══════════════════════════════════════
function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  socket.emit('chat-message', { roomId: myRoom, message: msg });
  input.value = '';
}

function handleChatKey(e) {
  if (e.key === 'Enter') sendChat();
}

function addChatMessage({ from, userName, message, time }) {
  const el = document.createElement('div');
  el.className = 'msg' + (from === mySocketId ? ' mine' : '');
  el.innerHTML = `
    <div class="msg-header">
      <span class="msg-name">${userName}</span>
      <span class="msg-time">${time}</span>
    </div>
    <div class="msg-text">${escapeHtml(message)}</div>
  `;
  const msgs = document.getElementById('messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// Wave animation
const waveStyle = document.createElement('style');
[1,2,3,4,5].forEach(i => {
  waveStyle.textContent += `
    @keyframes wave${i} {
      from { height: ${3 + i}px; }
      to { height: ${10 + i * 2}px; }
    }
  `;
});
document.head.appendChild(waveStyle);
</script>
